<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BOS Paper Co.  -  Order Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap"/>
<style>
:root{
  --navy:#1B3A6B;--navy-dk:#142d54;--navy-lt:#2B5BA8;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
  --cream:#f4f6fb;--white:#fff;--border:#e2e5ef;--gray:#6b7280;--gray-lt:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:#2a2d36;min-height:100vh;}
a{color:inherit;text-decoration:none;}
/* -- HEADER -- */
header{background:var(--white);border-bottom:3px solid var(--navy);padding:0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(27,58,107,.10);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:62px;max-width:1200px;margin:0 auto;}
.logo-wrap{display:flex;align-items:center;gap:1rem;}
.portal-badge{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;background:var(--navy);color:#fff;padding:.25rem .7rem;border-radius:20px;}
.mgr-btn{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;background:none;border:1.5px solid var(--navy);color:var(--navy);padding:.3rem .8rem;border-radius:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem;}
.mgr-btn:hover{background:var(--navy);color:#fff;}
.mgr-btn.active{background:var(--navy);color:#fff;}
/* -- WELCOME BAR -- */
.welcome{background:linear-gradient(135deg,var(--navy-dk),var(--navy));color:#fff;padding:.8rem 1.5rem;text-align:center;}
.welcome h2{font-family:'Oswald',sans-serif;font-size:1.05rem;letter-spacing:.06em;}
.welcome p{font-size:.8rem;opacity:.85;margin-top:.2rem;}
/* -- FILTERS -- */
.filters{padding:.8rem 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;max-width:1200px;margin:0 auto;}
.filter-btn{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .9rem;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--gray);cursor:pointer;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
/* -- MAIN LAYOUT -- */
.main{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;padding:0 1.5rem 2rem;max-width:1200px;margin:0 auto;}
@media(max-width:820px){.main{grid-template-columns:1fr;}}
/* -- PRODUCT GRID -- */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:1rem;align-content:start;}
.prod-card{background:var(--white);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow .2s;display:flex;flex-direction:column;}
.prod-card:hover{box-shadow:0 4px 18px rgba(27,58,107,.12);}
.prod-card.unavailable{opacity:.5;pointer-events:none;}
.prod-img{height:110px;background:#f8f9fc;overflow:hidden;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.prod-img img{max-width:100%;max-height:110px;object-fit:contain;padding:8px;}
.prod-info{padding:.6rem .7rem;flex:1;display:flex;flex-direction:column;gap:.25rem;}
.badges{display:flex;gap:.3rem;flex-wrap:wrap;}
.badge{font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;}
.badge-in{background:#dcfce7;color:var(--green);}
.badge-low{background:#fff3cd;color:#92570a;}
.badge-out{background:#fee2e2;color:var(--red);}
.badge-cat{background:#f0f2f8;color:var(--gray);}
.prod-name{font-family:'Oswald',sans-serif;font-size:.97rem;font-weight:600;color:var(--navy);line-height:1.25;margin-top:.15rem;}
.prod-detail{font-size:.72rem;color:var(--gray);line-height:1.3;}
.prod-price{font-family:'Oswald',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);margin-top:.1rem;}
.prod-price span{font-size:.72rem;font-weight:400;color:var(--gray);}
.prod-price.unknown{color:var(--gray);font-size:.78rem;font-weight:500;font-family:'Nunito',sans-serif;}
.qty-row{display:flex;align-items:center;gap:.4rem;margin-top:auto;padding-top:.5rem;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);color:var(--navy);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;transition:all .15s;}
.qty-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.qty-val{min-width:24px;text-align:center;font-weight:700;font-size:.9rem;}
.add-btn{margin-left:auto;font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;padding:.4rem .9rem;background:var(--navy);color:#fff;border:none;border-radius:5px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.add-btn:hover{background:var(--navy-lt);}
.add-btn.added{background:var(--green);}
/* -- ORDER PANEL -- */
.order-panel{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:1.2rem;position:sticky;top:80px;height:fit-content;}
.order-title{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
.cart-count{background:var(--navy);color:#fff;border-radius:50%;width:20px;height:20px;font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cart-empty{text-align:center;color:var(--gray-lt);font-size:.85rem;padding:1.5rem 0;}
.cart-items{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.cart-item{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;padding:.5rem;background:var(--cream);border-radius:6px;font-size:.82rem;}
.cart-item-name{font-weight:600;color:var(--navy);line-height:1.3;}
.cart-item-detail{color:var(--gray);font-size:.75rem;}
.cart-remove{background:none;border:none;color:var(--gray-lt);cursor:pointer;font-size:.9rem;padding:0 .2rem;transition:color .15s;flex-shrink:0;}
.cart-remove:hover{color:var(--red);}
.cart-total{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--navy);font-weight:600;padding:.5rem 0;border-top:1px solid var(--border);margin-bottom:.8rem;display:flex;justify-content:space-between;}
.section-label{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-bottom:.5rem;}
.del-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.del-opt{border:1.5px solid var(--border);border-radius:7px;padding:.6rem .8rem;cursor:pointer;transition:all .15s;display:flex;gap:.7rem;}
.del-opt:hover,.del-opt.selected{border-color:var(--navy);background:#f0f4fb;}
.del-opt input{margin-top:.2rem;accent-color:var(--navy);}
.del-opt-title{font-weight:600;font-size:.85rem;color:var(--navy);}
.del-opt-sub{font-size:.75rem;color:var(--gray);}
.cust-section{margin-bottom:1rem;}
.cust-section input,.cust-section textarea{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:.45rem .7rem;font-size:.83rem;font-family:'Nunito',sans-serif;background:var(--white);color:#2a2d36;margin-bottom:.5rem;resize:vertical;}
.cust-section input:focus,.cust-section textarea:focus{outline:none;border-color:var(--navy);}
.gen-btn{width:100%;font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;padding:.85rem;background:var(--navy);color:#fff;border:none;border-radius:7px;cursor:pointer;transition:background .15s;font-weight:600;}
.gen-btn:hover{background:var(--navy-lt);}
.gen-btn:disabled{background:#ccc;cursor:not-allowed;}
.order-result{margin-top:1rem;}
.order-msg{background:var(--cream);border:1.5px solid var(--border);border-radius:7px;padding:.8rem;font-size:.8rem;white-space:pre-wrap;word-break:break-word;color:#2a2d36;max-height:180px;overflow-y:auto;line-height:1.5;}
.send-btns{display:flex;gap:.5rem;margin-top:.6rem;}
.send-btn{flex:1;font-family:'Oswald',sans-serif;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;padding:.6rem;border:none;border-radius:6px;cursor:pointer;color:#fff;transition:opacity .15s;}
.send-btn:hover{opacity:.88;}
.send-sms{background:#22c55e;}
.send-line{background:#06C755;}
.send-copy{background:#6b7280;}
/* -- FLOATING CART BUTTON (mobile) -- */
.float-cart{display:none;position:fixed;bottom:1.2rem;right:1.2rem;z-index:400;background:var(--navy);color:#fff;border:none;border-radius:50px;padding:.75rem 1.2rem;font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:.05em;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);align-items:center;gap:.5rem;}
.float-cart .fc-badge{background:#ef4444;color:#fff;border-radius:50%;width:1.3rem;height:1.3rem;font-size:.75rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
@media(max-width:768px){.float-cart{display:flex;}}

/* -- MANAGER MODAL -- */
.mgr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem;}
.mgr-overlay.open{display:flex;}
.mgr-modal{background:var(--white);border-radius:12px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.mgr-header{background:var(--navy);color:#fff;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mgr-header h2{font-family:'Oswald',sans-serif;font-size:1.1rem;letter-spacing:.08em;}
.mgr-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.8;line-height:1;}
.mgr-close:hover{opacity:1;}
.mgr-auth{padding:1.5rem;text-align:center;}
.mgr-auth p{color:var(--gray);font-size:.85rem;margin-bottom:1rem;}
.mgr-auth input{width:100%;max-width:260px;border:1.5px solid var(--border);border-radius:6px;padding:.5rem .8rem;font-size:.9rem;text-align:center;letter-spacing:.2em;margin-bottom:.8rem;}
.mgr-auth input:focus{outline:none;border-color:var(--navy);}
.mgr-auth button{font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;padding:.5rem 1.6rem;background:var(--navy);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.mgr-auth .err{color:var(--red);font-size:.8rem;margin-top:.5rem;}
.mgr-body{overflow-y:auto;padding:1rem 1.4rem;flex:1;}
.mgr-product-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:.8rem;padding:.65rem 0;border-bottom:1px solid var(--border);}
.mgr-product-row:last-child{border-bottom:none;}
.mgr-prod-name{font-weight:600;font-size:.85rem;color:var(--navy);}
.mgr-prod-detail{font-size:.72rem;color:var(--gray);}
.mgr-price-input{width:72px;border:1.5px solid var(--border);border-radius:5px;padding:.3rem .5rem;font-size:.83rem;text-align:center;font-family:'Nunito',sans-serif;}
.mgr-price-input:focus{outline:none;border-color:var(--navy);}
.toggle-wrap{display:flex;align-items:center;gap:.4rem;}
.toggle{position:relative;width:42px;height:24px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:var(--green);}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);}
.toggle-label{font-size:.72rem;font-weight:600;color:var(--gray);width:22px;}
.mgr-save-btn{width:100%;margin-top:1rem;font-family:'Oswald',sans-serif;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;padding:.7rem;background:var(--navy);color:#fff;border:none;border-radius:7px;cursor:pointer;}
.mgr-save-btn:hover{background:var(--navy-lt);}
.mgr-cat-label{font-family:'Oswald',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--navy-lt);padding:.5rem 0 .3rem;font-weight:600;}
</style>
</head>

    </div>
    <button class="mgr-btn" id="mgrBtn" onclick="openMgr()">&#128274; Manager</button>

</header>

<!-- WELCOME -->
<div class="welcome">
  <h2>BOS Paper Co.  -  Restaurant Supply</h2>
  <p>Browse &amp; order below · Orders confirmed by BOS directly</p>
</div>

<!-- FILTERS -->
<div class="filters" id="filterBar"></div>

<!-- MAIN -->
<div class="main">
  <div class="prod-grid" id="prodGrid"></div>
  <div class="order-panel">
    <div class="order-title">
      Your Order <span class="cart-count" id="cartCount">0</span>
    </div>
    <div id="cartItems"><div class="cart-empty">No items yet  -  add from the left.</div></div>
    <div class="cart-total" id="cartTotal" style="display:none">
      <span>Subtotal</span><span id="totalAmt">$0</span>
    </div>
    <div class="section-label">Delivery</div>
    <div class="del-opts" id="delOpts">
      <label class="del-opt selected" id="opt-std">
        <input type="radio" name="del" value="std" checked/>
        <div><div class="del-opt-title">Standard  -  3 Business Days</div><div class="del-opt-sub">Free delivery</div></div>
      </label>
      <label class="del-opt" id="opt-emer">
        <input type="radio" name="del" value="emer"/>
        <div><div class="del-opt-title">Emergency  -  Next Business Day</div><div class="del-opt-sub">+$10 rush fee</div></div>
      </label>
    </div>
    <div class="section-label">Your Info</div>
    <div class="cust-section">
      <input type="text" id="custName" placeholder="Restaurant name"/>
      <input type="text" id="custPhone" placeholder="Phone number"/>
      <textarea id="orderNotes" rows="2" placeholder="Notes (e.g. 28oz: need white, special requests)"></textarea>
    </div>
    <button class="gen-btn" id="genBtn" onclick="generateOrder()" disabled>Place an Order</button>
    <div class="order-result" id="orderResult" style="display:none">
      <div class="order-msg" id="orderMsg"></div>
      <div class="send-btns">
        <button class="send-btn send-sms" onclick="sendSMS()">&#128241; SMS</button>
        <button class="send-btn send-line" onclick="sendLine()">&#128172; Line</button>
        <button class="send-btn send-copy" onclick="copyOrder()" id="copyBtn">&#128203; Copy</button>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING CART BUTTON -->
<button class="float-cart" id="floatCart" onclick="scrollToCart()">
  &#128722; Cart <span class="fc-badge" id="fcBadge">0</span>
</button>

<!-- MANAGER MODAL -->
<div class="mgr-overlay" id="mgrOverlay" onclick="closeMgrIfOutside(event)">
  <div class="mgr-modal">
    <div class="mgr-header">
      <h2>&#128274; Manager Mode</h2>
      <button class="mgr-close" onclick="closeMgr()">&#10005;</button>
    </div>
    <div id="mgrAuth" class="mgr-auth">
      <p>Enter manager password to access stock &amp; price controls.</p>
      <input type="password" id="mgrPw" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()"/>
      <br/>
      <button onclick="checkPw()">Unlock</button>
      <div class="err" id="mgrErr"></div>
    </div>
    <div id="mgrPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="mgr-body" id="mgrBody"></div>
      <div style="padding:0 1.4rem 1.2rem;flex-shrink:0;">
        <button class="mgr-save-btn" onclick="saveMgr()">&#10003; Save &amp; Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const ADMIN_PW = "1305";

const PRODUCTS = [
  // === BOXES (Hinged Containers) ===
  {id:1,  name:"FH-132 32oz Hinged Box",     detail:"Rect hinged container · 150/case",   cat:"Boxes", item_code:"FH-132-B", price:29, max_order:8},

// -- State --
// --- LIVE STOCK STATUS ---
var STOCK_API_URL = "https://script.google.com/macros/s/AKfycbwKrrzepBq5XTxuEJCcHKkYCACWlWxBt2ftkYM3yxPTTXyTAEAyPIFN5MmuAszNgMqV3A/exec";

function handleStockData(data) {
  if (!data || !data.stock) return;
  var stock = data.stock;
  PRODUCTS.forEach(function(p) {
    if (!p.item_code) return;
    var s = stock[p.item_code];
    if (s === "in_stock") { p.oos = false; p.low = false; }
    else if (s === "low") { p.oos = false; p.low = true; p.max_order = 1; }
    else if (s === "out") { p.oos = true; p.low = false; p.max_order = 1; }
    else if (s === "inactive") { p.oos = true; p.low = false; p.hidden = true; }
  });
  renderProducts();
  renderFilters();
}

function fetchStockStatus() {
  var s = document.createElement("script");
  s.src = STOCK_API_URL + "?callback=handleStockData&t=" + Date.now();
  s.onerror = function() { console.warn("[Stock] Failed to fetch"); };
  document.head.appendChild(s);
}

let cart = {};
let overrides = {};  // id -> {oos, price}
let activeFilter = 'All';

// -- Helpers --
function bizDaysAdd(date, days) {
  let d = new Date(date);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
}
function fmtPrice(p) {
  if (p === null || p === undefined) return null;
  return '$' + Number(p).toFixed(2);
}
function getProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return p;
  const ov = overrides[id] || {};
  return {...p, oos: ov.oos !== undefined ? ov.oos : p.oos, price: ov.price !== undefined ? ov.price : p.price};
}

// -- Filters --
function buildFilters() {
  const bar = document.getElementById('filterBar');
  const cats = ['All', ...new Set(PRODUCTS.map(p => p.cat))];
  bar.innerHTML = cats.map(c =>
    `<button class="filter-btn${c === activeFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}
function setFilter(cat) {
  activeFilter = cat;
  buildFilters();
  renderGrid();
}

// -- Grid --
function renderGrid() {
  const grid = document.getElementById('prodGrid');
  const list = activeFilter === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.cat === activeFilter);
  grid.innerHTML = list.map(p => {
    const prod = getProduct(p.id);
    const qty = cart[p.id] || 0;
    const available = !prod.oos;
    const statusBadge = prod.oos
      ? `<span class="badge badge-out">Out of Stock</span>`
      : (prod.low ? `<span class="badge badge-low">Low Stock</span>` : `<span class="badge badge-in">In Stock</span>`);
    const imgSrc = IMG[p.id] || '';
    const priceDisplay = prod.price !== null && prod.price !== undefined
      ? `<div class="prod-price">$${Number(prod.price).toFixed(2)} <span>/ case</span></div>`
      : `<div class="prod-price unknown">Price on request</div>`;
    return `
    <div class="prod-card${prod.oos ? ' unavailable' : ''}" id="card-${p.id}">
      <div class="prod-img">${imgSrc ? `<img src="${imgSrc}" alt="${p.name}" loading="lazy"/>` : '<div style="font-size:2.5rem;color:#ccc;padding:1rem;">&#128230;</div>'}</div>
      <div class="prod-info">
        <div class="badges">
          ${statusBadge}
          <span class="badge badge-cat">${p.cat}</span>
        </div>
        <div class="prod-name">${prod.oos ? p.name : (getProduct(p.id).name || p.name)}</div>
        <div class="prod-detail">${p.detail}</div>
        ${priceDisplay}
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${p.id},-1)">-</button>
          <span class="qty-val" id="qty-${p.id}">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
          <button class="add-btn${qty > 0 ? ' added' : ''}" id="addbtn-${p.id}" onclick="addToCart(${p.id})">${qty > 0 ? '+ Added' : 'Add'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// -- Qty / Cart --
function changeQty(id, delta) {
  const p = getProduct(id);
  const max = p.max_order || 10;
  cart[id] = Math.max(0, Math.min((cart[id] || 0) + delta, max));
  document.getElementById('qty-' + id).textContent = cart[id];
  const btn = document.getElementById('addbtn-' + id);
  if (btn) btn.className = 'add-btn' + (cart[id] > 0 ? ' added' : '');
  updateOrderBtn();
}
function addToCart(id) {
  if (!cart[id]) changeQty(id, 1);
  renderCart();
  updateOrderBtn();
}
function removeFromCart(id) {
  delete cart[id];
  document.getElementById('qty-' + id).textContent = 0;
  const btn = document.getElementById('addbtn-' + id);
  if (btn) btn.className = 'add-btn';
  renderCart();
  updateOrderBtn();
}
function renderCart() {
  const items = Object.entries(cart).filter(([,v]) => v > 0);
  const el = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  const countEl = document.getElementById('cartCount');
  countEl.textContent = items.length;
  const fcBadge = document.getElementById('fcBadge');
  if (fcBadge) fcBadge.textContent = items.length;
  if (!items.length) {
    el.innerHTML = '<div class="cart-empty">No items yet  -  add from the left.</div>';
    totalEl.style.display = 'none';
    return;
  }
  let total = 0;
  let hasUnknownPrice = false;
  el.innerHTML = '<div class="cart-items">' + items.map(([id, qty]) => {
    const p = getProduct(Number(id));
    const lineTotal = p.price ? p.price * qty : null;
    if (lineTotal !== null) total += lineTotal; else hasUnknownPrice = true;
    return `<div class="cart-item">
      <div>
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-detail">${qty} case${qty>1?'s':''}${lineTotal ? ' · $'+lineTotal.toFixed(2) : ''}</div>
      </div>
      <button class="cart-remove" onclick="removeFromCart(${id})">X</button>
    </div>`;
  }).join('') + '</div>';
  totalEl.style.display = 'flex';
  document.getElementById('totalAmt').textContent = total > 0
    ? '$' + total.toFixed(2) + (hasUnknownPrice ? '+' : '')
    : ' - ';
}
function updateOrderBtn() {
  const hasItems = Object.values(cart).some(v => v > 0);
  document.getElementById('genBtn').disabled = !hasItems;
  renderCart();
}

// -- Delivery options --
document.querySelectorAll('input[name="del"]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('.del-opt').forEach(o => o.classList.remove('selected'));
    r.closest('.del-opt').classList.add('selected');
  });
});

// -- Generate order --
function generateOrder() {
  const name = document.getElementById('custName').value.trim() || '(no name)';
  const phone = document.getElementById('custPhone').value.trim() || '(no phone)';
  const notes = document.getElementById('orderNotes').value.trim();
  const delType = document.querySelector('input[name="del"]:checked').value;
  const delDate = fmtDate(bizDaysAdd(new Date(), delType === 'emer' ? 1 : 3));
  const items = Object.entries(cart).filter(([,v]) => v > 0);
  let total = 0;
  let hasUnknown = false;
  const lines = items.map(([id, qty]) => {
    const p = getProduct(Number(id));
    const line = p.price ? p.price * qty : null;
    if (line) total += line; else hasUnknown = true;
    return `  * ${p.name} x${qty} case${qty>1?'s':''}${line ? ' ($'+line.toFixed(2)+')' : ''}`;
  });
  const totalStr = total > 0 ? '\nSubtotal: $' + total.toFixed(2) + (hasUnknown ? '+' : '') : '';
  const rush = delType === 'emer' ? '\n! EMERGENCY ORDER  -  +$10 rush fee' : '';
  const notesLine = notes ? `\nNotes: ${notes}` : '';
  const msg = `BOS Paper Co. Order\n${'-'.repeat(28)}\nFrom: ${name}\nPhone: ${phone}\nDelivery: ${delType==='emer'?'EMERGENCY':'Standard'}  -  ${delDate}${rush}\n\nItems:\n${lines.join('\n')}${totalStr}${notesLine}\n${'-'.repeat(28)}`;
  document.getElementById('orderMsg').textContent = msg;
  document.getElementById('orderResult').style.display = 'block';
  document.getElementById('genBtn').textContent = '+ Order Ready  -  Edit Above if Needed';
}
function sendSMS() {
  const msg = document.getElementById('orderMsg').textContent;
  window.location.href = 'sms:+16175551234?body=' + encodeURIComponent(msg);
}
function sendLine() {
  window.open('https://line.me/ti/p/~tobvv', '_blank');
}
function copyOrder() {
  const msg = document.getElementById('orderMsg').textContent;
  navigator.clipboard.writeText(msg).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '\u2713 Copied!';
    setTimeout(() => { btn.innerHTML = '&#128203; Copy'; }, 2000);
  });
}
function scrollToCart() {
  document.querySelector('.order-panel').scrollIntoView({behavior:'smooth'});
}

// -- Manager Mode --
function openMgr() {
  document.getElementById('mgrOverlay').classList.add('open');
  document.getElementById('mgrPw').value = '';
  document.getElementById('mgrErr').textContent = '';
  document.getElementById('mgrAuth').style.display = '';
  document.getElementById('mgrPanel').style.display = 'none';
  document.getElementById('mgrBtn').classList.add('active');
  setTimeout(() => document.getElementById('mgrPw').focus(), 100);
}
function closeMgr() {
  document.getElementById('mgrOverlay').classList.remove('open');
  document.getElementById('mgrBtn').classList.remove('active');
}
function closeMgrIfOutside(e) {
  if (e.target === document.getElementById('mgrOverlay')) closeMgr();
}
function checkPw() {
  const pw = document.getElementById('mgrPw').value;
  if (pw === ADMIN_PW) {
    document.getElementById('mgrAuth').style.display = 'none';
    document.getElementById('mgrPanel').style.display = 'flex';
    buildMgrPanel();
  } else {
    document.getElementById('mgrErr').textContent = 'Incorrect password.';
    document.getElementById('mgrPw').select();
  }
}
function buildMgrPanel() {
  const body = document.getElementById('mgrBody');
  let html = '';
  let lastCat = '';
  PRODUCTS.forEach(p => {
    if (p.cat !== lastCat) {
      html += `<div class="mgr-cat-label">${p.cat}</div>`;
      lastCat = p.cat;
    }
    const prod = getProduct(p.id);
    const isIn = !prod.oos;
    const price = prod.price !== null && prod.price !== undefined ? prod.price : '';
    html += `
    <div class="mgr-product-row" id="mgrrow-${p.id}">
      <div>
        <div class="mgr-prod-name">${p.name}</div>
        <div class="mgr-prod-detail">${p.detail}</div>
      </div>
      <div>
        <div style="font-size:.65rem;color:var(--gray);margin-bottom:.2rem;text-align:center;">Price/case</div>
        <input class="mgr-price-input" type="number" id="mgr-price-${p.id}" value="${price}" placeholder=" - " min="0" step="0.01"/>
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="mgr-tog-${p.id}" ${isIn ? 'checked' : ''} onchange="updateToggleLabel(${p.id})"/>
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label" id="mgr-lbl-${p.id}">${isIn ? 'ON' : 'OFF'}</span>
      </div>
    </div>`;
  });
  body.innerHTML = html;
}
function updateToggleLabel(id) {
  const on = document.getElementById('mgr-tog-' + id).checked;
  document.getElementById('mgr-lbl-' + id).textContent = on ? 'ON' : 'OFF';
}
function saveMgr() {
  PRODUCTS.forEach(p => {
    const tog = document.getElementById('mgr-tog-' + p.id);
    const priceInput = document.getElementById('mgr-price-' + p.id);
    if (tog) {
      overrides[p.id] = overrides[p.id] || {};
      overrides[p.id].oos = !tog.checked;
    }
    if (priceInput && priceInput.value !== '') {
      overrides[p.id] = overrides[p.id] || {};
      overrides[p.id].price = parseFloat(priceInput.value);
    }
  });
  closeMgr();
  renderGrid();
  renderCart();
}

// -- Init --
buildFilters();
renderGrid();
</script>
